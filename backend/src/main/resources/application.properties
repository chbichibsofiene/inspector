# ===== Server =====
server.port=8081

# ===== MySQL DataSource =====
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/inspector_system_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# Change this secret to a long random string in production!
app.jwt.secret=3c2e6b8f1a9d4e7f2b5c8a1d4f7e0b3c2e6b8f1a9d4e7f2b5c8a1d4f7e0b3c
app.jwt.expiration-ms=86400000

# ===== CORS (tweak origins for your frontend URL) =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# ===== Logging =====
logging.level.com.inspector=DEBUG
logging.level.org.springframework.security=INFO

# ===== Microsoft Azure OAuth2 (Teams) =====
# Get these from Azure Portal -> App Registrations
spring.security.oauth2.client.registration.azure.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.azure.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.azure.scope=openid, profile, email, OnlineMeetings.ReadWrite, offline_access
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/azure

spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/YOUR_TENANT_ID/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/YOUR_TENANT_ID/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/YOUR_TENANT_ID/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-name-attribute=name

