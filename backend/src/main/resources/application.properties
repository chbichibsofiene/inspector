# ===== Server =====
server.port=8080

# ===== MySQL DataSource =====
spring.datasource.url=jdbc:mysql://localhost:3306/inspector_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# Change this secret to a long random string in production!
app.jwt.secret=3c2e6b8f1a9d4e7f2b5c8a1d4f7e0b3c2e6b8f1a9d4e7f2b5c8a1d4f7e0b3c
app.jwt.expiration-ms=86400000

# ===== CORS (tweak origins for your frontend URL) =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===== Logging =====
logging.level.com.inspector=DEBUG
logging.level.org.springframework.security=INFO
