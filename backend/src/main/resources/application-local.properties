# ===== Local demo profile =====
server.port=8081

# In-memory database for local testing without MySQL credentials.
spring.datasource.url=jdbc:h2:mem:inspector_demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=3c2e6b8f1a9d4e7f2b5c8a1d4f7e0b3c2e6b8f1a9d4e7f2b5c8a1d4f7e0b3c
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173

logging.level.com.inspector=DEBUG
logging.level.org.springframework.security=INFO
