<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980">
  <defs>
    <style>
      .bg{fill:#f8fafc}.layer{fill:#ffffff;stroke:#1f2937;stroke-width:2;rx:14}.box{fill:#eef6ff;stroke:#2563eb;stroke-width:1.8;rx:9}.service{fill:#f0fdf4;stroke:#16a34a;stroke-width:1.8;rx:9}.repo{fill:#fff7ed;stroke:#ea580c;stroke-width:1.8;rx:9}.data{fill:#f5f3ff;stroke:#7c3aed;stroke-width:1.8;rx:9}.title{font:700 22px Arial, sans-serif;fill:#111827}.layerTitle{font:700 18px Arial, sans-serif;fill:#111827}.label{font:600 14px Arial, sans-serif;fill:#111827}.small{font:12px Arial, sans-serif;fill:#374151}.arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}.dashed{stroke:#64748b;stroke-width:1.8;stroke-dasharray:7 5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="980"/>
  <text x="640" y="42" text-anchor="middle" class="title">Detailed Backend Logical N-Tier Architecture</text>

  <rect x="60" y="80" width="1160" height="80" class="layer"/>
  <text x="95" y="112" class="layerTitle">Clients</text>
  <rect x="455" y="98" width="370" height="42" class="box"/>
  <text x="640" y="124" text-anchor="middle" class="label">Web React / Mobile React Native</text>

  <rect x="60" y="190" width="1160" height="120" class="layer"/>
  <text x="95" y="222" class="layerTitle">Security and API Boundary</text>
  <rect x="170" y="242" width="210" height="42" class="box"/>
  <text x="275" y="268" text-anchor="middle" class="label">JWT Authentication Filter</text>
  <rect x="440" y="242" width="210" height="42" class="box"/>
  <text x="545" y="268" text-anchor="middle" class="label">SecurityConfig + RBAC</text>
  <rect x="710" y="242" width="210" height="42" class="box"/>
  <text x="815" y="268" text-anchor="middle" class="label">DTO Request/Response</text>
  <rect x="980" y="242" width="180" height="42" class="box"/>
  <text x="1070" y="268" text-anchor="middle" class="label">Global Exceptions</text>

  <rect x="60" y="340" width="1160" height="150" class="layer"/>
  <text x="95" y="372" class="layerTitle">Presentation Layer</text>
  <rect x="100" y="402" width="185" height="46" class="box"/>
  <text x="192" y="430" text-anchor="middle" class="label">AuthController</text>
  <rect x="310" y="402" width="185" height="46" class="box"/>
  <text x="402" y="430" text-anchor="middle" class="label">AdminController</text>
  <rect x="520" y="402" width="185" height="46" class="box"/>
  <text x="612" y="423" text-anchor="middle" class="label">Inspector Controllers</text>
  <text x="612" y="440" text-anchor="middle" class="small">activities, reports, courses</text>
  <rect x="730" y="402" width="185" height="46" class="box"/>
  <text x="822" y="423" text-anchor="middle" class="label">Teacher Controllers</text>
  <text x="822" y="440" text-anchor="middle" class="small">calendar, quizzes, reports</text>
  <rect x="940" y="402" width="220" height="46" class="box"/>
  <text x="1050" y="423" text-anchor="middle" class="label">Messaging Controllers</text>
  <text x="1050" y="440" text-anchor="middle" class="small">chat, notifications</text>

  <rect x="60" y="520" width="1160" height="190" class="layer"/>
  <text x="95" y="552" class="layerTitle">Business Logic Layer</text>
  <rect x="105" y="580" width="155" height="42" class="service"/><text x="182" y="606" text-anchor="middle" class="label">AuthService</text>
  <rect x="285" y="580" width="155" height="42" class="service"/><text x="362" y="606" text-anchor="middle" class="label">UserService</text>
  <rect x="465" y="580" width="155" height="42" class="service"/><text x="542" y="606" text-anchor="middle" class="label">ActivityService</text>
  <rect x="645" y="580" width="155" height="42" class="service"/><text x="722" y="606" text-anchor="middle" class="label">ReportService</text>
  <rect x="825" y="580" width="155" height="42" class="service"/><text x="902" y="606" text-anchor="middle" class="label">CourseService</text>
  <rect x="1005" y="580" width="155" height="42" class="service"/><text x="1082" y="606" text-anchor="middle" class="label">QuizService</text>
  <rect x="195" y="650" width="170" height="42" class="service"/><text x="280" y="676" text-anchor="middle" class="label">AnalyticsService</text>
  <rect x="390" y="650" width="170" height="42" class="service"/><text x="475" y="676" text-anchor="middle" class="label">DashboardService</text>
  <rect x="585" y="650" width="170" height="42" class="service"/><text x="670" y="676" text-anchor="middle" class="label">MessengerService</text>
  <rect x="780" y="650" width="170" height="42" class="service"/><text x="865" y="676" text-anchor="middle" class="label">NotificationService</text>
  <rect x="975" y="650" width="170" height="42" class="service"/><text x="1060" y="676" text-anchor="middle" class="label">Gemini / Email</text>

  <rect x="60" y="740" width="820" height="145" class="layer"/>
  <text x="95" y="772" class="layerTitle">Data Access Layer</text>
  <rect x="95" y="805" width="150" height="42" class="repo"/><text x="170" y="831" text-anchor="middle" class="label">UserRepository</text>
  <rect x="265" y="805" width="170" height="42" class="repo"/><text x="350" y="831" text-anchor="middle" class="label">Profile Repositories</text>
  <rect x="455" y="805" width="170" height="42" class="repo"/><text x="540" y="831" text-anchor="middle" class="label">Activity / Report</text>
  <rect x="645" y="805" width="195" height="42" class="repo"/><text x="742" y="831" text-anchor="middle" class="label">Course / Quiz / Message</text>

  <rect x="920" y="740" width="300" height="145" class="layer"/>
  <text x="955" y="772" class="layerTitle">Persistence Layer</text>
  <rect x="965" y="798" width="210" height="38" class="data"/><text x="1070" y="822" text-anchor="middle" class="label">JPA Entities</text>
  <rect x="965" y="848" width="210" height="38" class="data"/><text x="1070" y="872" text-anchor="middle" class="label">MySQL Database</text>

  <rect x="60" y="910" width="1160" height="48" class="layer"/>
  <text x="95" y="940" class="layerTitle">External Services: Google Gemini API, SMTP Email Provider, Jitsi Meet</text>

  <path class="arrow" d="M640 140 V242"/>
  <path class="arrow" d="M380 263 H440"/>
  <path class="arrow" d="M650 263 H710"/>
  <path class="arrow" d="M815 284 V402"/>
  <path class="arrow" d="M640 448 V580"/>
  <path class="arrow" d="M640 692 V805"/>
  <path class="arrow" d="M840 826 H965"/>
  <path class="arrow" d="M1070 836 V848"/>
  <path class="dashed" d="M1070 692 V910"/>
</svg>
