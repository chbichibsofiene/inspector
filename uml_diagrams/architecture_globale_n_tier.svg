<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .bg{fill:#f8fafc}.tier{fill:#ffffff;stroke:#1f2937;stroke-width:2}.box{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:10}.box2{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:10}.box3{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}.ext{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:10}.title{font:700 22px Arial, sans-serif;fill:#111827}.label{font:600 17px Arial, sans-serif;fill:#111827}.small{font:14px Arial, sans-serif;fill:#374151}.arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="640" y="42" text-anchor="middle" class="title">Global N-Tier Architecture - Inspector Platform</text>

  <rect x="40" y="85" width="250" height="540" class="tier" rx="14"/>
  <text x="165" y="120" text-anchor="middle" class="title">Client Tier</text>
  <rect x="70" y="170" width="190" height="90" class="box"/>
  <text x="165" y="205" text-anchor="middle" class="label">Web Client</text>
  <text x="165" y="232" text-anchor="middle" class="small">React + Vite</text>
  <rect x="70" y="330" width="190" height="90" class="box"/>
  <text x="165" y="365" text-anchor="middle" class="label">Mobile Client</text>
  <text x="165" y="392" text-anchor="middle" class="small">React Native + Expo</text>

  <rect x="350" y="85" width="220" height="540" class="tier" rx="14"/>
  <text x="460" y="120" text-anchor="middle" class="title">Secure API</text>
  <rect x="380" y="190" width="160" height="88" class="box2"/>
  <text x="460" y="222" text-anchor="middle" class="label">REST API</text>
  <text x="460" y="249" text-anchor="middle" class="small">HTTPS + JSON + JWT</text>
  <rect x="380" y="350" width="160" height="88" class="box2"/>
  <text x="460" y="382" text-anchor="middle" class="label">WebSocket</text>
  <text x="460" y="409" text-anchor="middle" class="small">STOMP real-time</text>

  <rect x="630" y="85" width="330" height="540" class="tier" rx="14"/>
  <text x="795" y="120" text-anchor="middle" class="title">Application Tier</text>
  <rect x="665" y="155" width="260" height="62" class="box3"/>
  <text x="795" y="192" text-anchor="middle" class="label">Spring Security + JWT Filter</text>
  <rect x="665" y="245" width="260" height="62" class="box3"/>
  <text x="795" y="282" text-anchor="middle" class="label">REST Controllers</text>
  <rect x="665" y="335" width="260" height="62" class="box3"/>
  <text x="795" y="372" text-anchor="middle" class="label">Business Services</text>
  <rect x="665" y="425" width="260" height="62" class="box3"/>
  <text x="795" y="462" text-anchor="middle" class="label">Messaging + Notifications</text>
  <rect x="665" y="515" width="260" height="62" class="box3"/>
  <text x="795" y="552" text-anchor="middle" class="label">AI / Jitsi / Email Integrations</text>

  <rect x="1020" y="85" width="220" height="540" class="tier" rx="14"/>
  <text x="1130" y="120" text-anchor="middle" class="title">Data Tier</text>
  <rect x="1050" y="220" width="160" height="78" class="ext"/>
  <text x="1130" y="253" text-anchor="middle" class="label">JPA Repositories</text>
  <text x="1130" y="278" text-anchor="middle" class="small">Hibernate ORM</text>
  <rect x="1050" y="360" width="160" height="78" class="ext"/>
  <text x="1130" y="393" text-anchor="middle" class="label">MySQL 8.0</text>
  <text x="1130" y="418" text-anchor="middle" class="small">persistent storage</text>

  <path class="arrow" d="M260 215 H380"/>
  <path class="arrow" d="M260 375 H380"/>
  <path class="arrow" d="M540 234 H665"/>
  <path class="arrow" d="M540 394 H665"/>
  <path class="arrow" d="M795 217 V245"/>
  <path class="arrow" d="M795 307 V335"/>
  <path class="arrow" d="M795 397 V425"/>
  <path class="arrow" d="M925 366 H1050"/>
  <path class="arrow" d="M1130 298 V360"/>
</svg>
